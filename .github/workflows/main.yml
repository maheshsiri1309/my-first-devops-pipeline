name: Docker Build and Security Scan

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t my-secure-image:latest .

      # --- NEW DEVOPS SECURITY STEP ---
      - name: Scan Image for Vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'my-secure-image:latest'
          format: 'table'
          exit-code: '0' # This tells the pipeline "don't fail yet, just show me the risks"
          severity: 'CRITICAL,HIGH'
