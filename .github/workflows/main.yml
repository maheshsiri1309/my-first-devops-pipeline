name: Docker Build Pipeline

# 1. When should this run? (On every "push" to the main branch)
on:
  push:
    branches: [ "main" ]

# 2. What should it do?
jobs:
  build-and-test:
    runs-on: ubuntu-latest  # Use a fresh Linux VM provided by GitHub

    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Step 1: Copy my code onto the VM

      - name: Build Docker Image
        run: docker build -t my-test-image:latest .  # Step 2: Run the Docker build

      - name: Verify Build
        run: echo "Build successful! Your first CI/CD pipeline worked."
